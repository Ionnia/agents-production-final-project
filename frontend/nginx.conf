server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Backend API + SSE. Same-origin from the browser's view (no CORS).
    # Resolve the upstream at request time via docker's embedded DNS so the
    # frontend container survives backend restarts / late starts.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream http://backend:8000;
        proxy_pass $upstream$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events: stream immediately, never buffer or time out.
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
